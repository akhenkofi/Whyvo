# backend deploy marker: keep Railway backend builds anchored to backend/ config
[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["python3 -m ensurepip --upgrade || true", "python3 -m pip install --upgrade pip", "python3 -m pip install -r requirements.txt"]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"
